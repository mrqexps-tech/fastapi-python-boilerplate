<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>To‑Do List (LocalStorage)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>To‑Do List</h1>

    <section class="add">
      <input id="new-task" type="text" placeholder="What needs to be done?" aria-label="New task">
      <button id="add-btn">Add</button>
    </section>

    <section class="controls">
      <label><input type="checkbox" id="show-completed"> Show completed</label>
      <button id="clear-completed">Clear completed</button>
    </section>

    <ul id="tasks" class="task-list" aria-live="polite"></ul>

    <footer class="hint">All tasks are stored locally in your browser (localStorage).</footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
